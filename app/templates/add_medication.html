<!--
  Add Medication form for MediTrack.
  Collects name, dosage, frequency, and scheduled time for a new medication.
-->
{% extends 'base.html' %}
{% block title %}Add Medication{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-card" id="add-medication-card">
        <div class="form-header">
            <div class="form-icon">
                <i class="fas fa-plus-circle"></i>
            </div>
            <h1>Add Medication</h1>
            <p>Enter the details of your new medication below</p>
        </div>
        <form method="POST" action="{{ url_for('main.add_medication') }}" class="medication-form" id="add-medication-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="name">
                    <i class="fas fa-pills"></i> Medication Name
                </label>
                <input type="text" id="name" name="name" placeholder="e.g., Aspirin, Metformin" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="dosage">
                        <i class="fas fa-prescription-bottle-alt"></i> Dosage
                    </label>
                    <input type="text" id="dosage" name="dosage" placeholder="e.g., 500mg, 1 tablet" required>
                </div>
                <div class="form-group">
                    <label for="frequency">
                        <i class="fas fa-sync-alt"></i> Frequency
                    </label>
                    <select id="frequency" name="frequency" required>
                        <option value="" disabled selected>Select frequency</option>
                        <option value="Once daily">Once daily</option>
                        <option value="Twice daily">Twice daily</option>
                        <option value="Three times daily">Three times daily</option>
                        <option value="Every 8 hours">Every 8 hours</option>
                        <option value="Every 12 hours">Every 12 hours</option>
                        <option value="As needed">As needed</option>
                        <option value="Weekly">Weekly</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="time">
                    <i class="fas fa-clock"></i> Scheduled Time
                </label>
                <input type="time" id="time" name="time" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block" id="add-med-submit">
                    <i class="fas fa-plus"></i> Add Medication
                </button>
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline btn-block">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
