<!--
  Login page for MediTrack.
  Provides a form for existing users to authenticate.
-->
{% extends 'base.html' %}
{% block title %}Log In{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card" id="login-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Log in to continue tracking your medications</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Username
                </label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="login-submit">
                <i class="fas fa-sign-in-alt"></i> Log In
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Create one here</a></p>
        </div>
    </div>
</section>
{% endblock %}
