<!--
  Registration page for MediTrack.
  Collects username, email, and password to create a new account.
-->
{% extends 'base.html' %}
{% block title %}Create Account{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card" id="register-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p>Start your medication tracking journey today</p>
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" id="register-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Username
                </label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-lock"></i> Confirm Password
                </label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="register-submit">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a></p>
        </div>
    </div>
</section>
{% endblock %}
